<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>abou-talib.com</title>
    <link rel="stylesheet" href="static/css/bootstrap-icons.css">
    <link rel="stylesheet" href="static/css/bootstrap.min.css">
    <link rel="stylesheet" href="static/css/templatemo-topic-listing.css">
    <link rel="stylesheet" href="static/css/profile_page1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.css">
    
</head>
<body>
    {%include 'appbare.html'%}
    <!--navbare-->
    <main>
        {% for post in posts %}
        <section class="article">
            <form action="/sport" method="POST">
                <input type="hidden" name="name" value="{{post.name}}">
                <input id="submit" type="submit" value="{{ post.name }}" >
            </form>
            <h6>{{ post.date }}</h6>
            <div class="content-wrapper">
              <div class="swiper post-slider">
                <div class="swiper-wrapper">
                  {% for img in [post.img1, post.img2, post.img3, post.img4] %}
                    {% if img %}
                      <div class="swiper-slide">
                        <img src="{{ img }}" alt="صورة مقال">
                      </div>
                    {% endif %}
                  {% endfor %}
                </div>
                <div class="swiper-pagination"></div>
                <div class="swiper-button-prev"></div>
                <div class="swiper-button-next"></div>
              </div>
              <h2 id="title">{{ post.title }}</h2>
              <div>
                <p id="paragraph{{ post.id }}" class="paragraph collapsed">{{ post.body }}</p>
                <a href="javascript:void(0);" id="toggle-link{{ post.id }}" class="toggle-link" data-id="{{ post.id }}">عرض المزيد</a>
              </div>
            </div>
          </section>
        {% endfor %}
        {%include 'footer.html'%}
        
    </main>
    <script src="static/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/custom.js"></script>
    <script src="static/js/jquery.min.js"></script>
    <script src="static/js/jquery.sticky.js"></script>
    <script src="/static/lien.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.js"></script>
    <script src="static/js/slider.js"></script>
</body>
</html>
