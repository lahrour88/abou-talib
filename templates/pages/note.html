<!DOCTYPE html>

<head>

  <link rel="stylesheet" href="static/css/bootstrap.min.css">
  <link rel="stylesheet" href="static/css/bootstrap-icons.css">
  <link rel="stylesheet" href="/static/css/note.css">

<body>
  {% include "appbare.html" %}

      <h2 class="text-center mb-4 text-primary fw-bold">📊 حساب النقاط</h2>
<form hx-post="/notes" hx-target="#result">
  <div class="table-responsive">

          <th>الفرض الأول</th>
          <th>الفرض الثاني</th>
          <th>الفرض الثالث</th>
          <th>الفرض الرابع</th>
          <th>الأنشطة المندمجة</th>
          <th>المعاملات</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>الاجتماعيات</td>
          <td><input type="number" name="ig1" placeholder="00" step="any"></td>
          <td><input type="number" name="ig2" placeholder="00" step="any"></td>
          <td></td>
          <td></td>
          <td><input type="number" name="ig-n" placeholder="00" step="any"></td>
          <td><input type="number" name="ig" value="2" required step="any"></td>
        </tr>
        <tr>
          <td>التربية الاسلامية</td>
          <td><input type="number" name="is1" placeholder="00" step="any"></td>
          <td><input type="number" name="is2" placeholder="00" step="any"></td>
          <td></td>
          <td></td>
          <td><input type="number" name="is-n" placeholder="00" step="any"></td>
          <td><input type="number" name="isl" value="2" required step="any"></td>
        </tr>
        <tr>
          <td>الرياضة</td>
          <td><input type="number" name="sp1" placeholder="00" step="any"></td>
          <td><input type="number" name="sp2" placeholder="00" step="any"></td>
          <td></td>
          <td></td>
          <td><input type="number" name="sp-n" placeholder="00" step="any"></td>
          <td><input type="number" name="sp" value="2" required step="any"></td>
        </tr>
        <tr>
          <td>الرياضيات</td>
          <td><input type="number" name="math1" placeholder="00" step="any"></td>
          <td><input type="number" name="math2" placeholder="00" step="any"></td>
          <td><input type="number" name="math3" placeholder="00" step="any"></td>
          <td></td>
          <td></td>
          <td><input type="number" name="math" value="7" required step="any"></td>
        </tr>
        <tr>
          <td>الفلسفة</td>
          <td><input type="number" name="fl1" placeholder="00" step="any"></td>
          <td><input type="number" name="fl2" placeholder="00" step="any"></td>
          <td></td>
          <td></td>
          <td><input type="number" name="fl-n" placeholder="00" step="any"></td>
          <td><input type="number" name="fl" value="2" required step="any"></td>
        </tr>
        <tr>
          <td>الفيزياء</td>
          <td><input type="number" name="pc1" placeholder="00" step="any"></td>
          <td><input type="number" name="pc2" placeholder="00" step="any"></td>

          <td><input type="number" name="ar1" placeholder="00" step="any"></td>
          <td><input type="number" name="ar2" placeholder="00" step="any"></td>
          <td></td>
          <td></td>
          <td><input type="number" name="ar-n" placeholder="00" step="any"></td>
          <td><input type="number" name="ar" value="2" required step="any"></td>
        </tr>

      <input type="number" id="n" name="n" class="form-control w-50 rounded-start" placeholder="نقطة الأنشطة المندمجة" step="any">
      <button type="submit" id="send" class="btn btn-success px-4 rounded-end">إرسال</button>
    </div>
  </div>
</form>

      <div id="result" class="mt-4 text-center fw-bold"></div>
    </div>
  </main>
    {%include "footer.html" %}
  <script src="https://unpkg.com/htmx.org/dist/htmx.min.js"></script>
  <script src="static/js/bootstrap.bundle.min.js"></script>
